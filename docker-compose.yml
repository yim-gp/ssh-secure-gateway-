services:
  gateway:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gateway-v2
    ports:
      - "2222:22"
    env_file:
      - .env
    volumes:
      - ./gateway-shell.sh:/usr/local/bin/gateway-shell.sh:ro
      - ./send-otp.py:/usr/local/bin/send-otp.py:ro
      - ./send-otp-helper.sh:/usr/local/bin/send-otp-helper.sh:ro
      - ./logs/gateway:/var/log/gateway
    restart: unless-stopped
